name: CI

on:
  workflow_call:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      core: ${{ steps.filter.outputs.core }}
      fe: ${{ steps.filter.outputs.fe }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            core:
              - 'apps/bidmart-core/**'
              - '.github/workflows/ci.yml'
              - '.github/workflows/main.yml'
            fe:
              - 'apps/bidmart-fe/**'
              - '.github/workflows/ci.yml'
              - '.github/workflows/main.yml'

  # ========== BUILD & TEST ==========

  core:
    needs: detect-changes
    if: needs.detect-changes.outputs.core == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Compose
        uses: docker/setup-compose-action@v2
        with:
          version: latest

      - name: Run services
        working-directory: infra
        run: docker compose -f dev-compose.yml up -d

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        working-directory: apps/bidmart-core
        run: chmod +x gradlew

      - name: Build with Gradle
        working-directory: apps/bidmart-core
        run: ./gradlew build

      - name: Run tests + JaCoCo
        working-directory: apps/bidmart-core
        run: ./gradlew test jacocoTestReport

      - name: SonarCloud Scan
        working-directory: apps/bidmart-core
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./gradlew sonar --info

      - name: Cleanup
        if: always()
        working-directory: infra
        run: docker compose -f dev-compose.yml down

  fe:
    needs: detect-changes
    if: needs.detect-changes.outputs.fe == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: 'apps/bidmart-fe/pnpm-lock.yaml'

      - name: Install dependencies
        working-directory: apps/bidmart-fe
        run: pnpm install --no-frozen-lockfile

      - name: Lint
        working-directory: apps/bidmart-fe
        run: pnpm lint

      - name: Build
        working-directory: apps/bidmart-fe
        run: pnpm build

  # ========== SONARCLOUD SCANS ==========

  sonar-fe:
    needs: [detect-changes, fe]
    if: needs.detect-changes.outputs.fe == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: 'apps/bidmart-fe/pnpm-lock.yaml'

      - name: Install dependencies
        working-directory: apps/bidmart-fe
        run: pnpm install --no-frozen-lockfile

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: apps/bidmart-fe

  # Depends only on detect-changes (always runs) to avoid the GitHub workflow_call
  # bug where all-skipped needs permanently stalls ci-summary.
  # core/fe/sonar-fe still report their own pass/fail status on the PR.
  ci-summary:
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: always()
    steps:
      - name: CI complete
        run: echo "✅ CI checks passed (core=${{ needs.detect-changes.outputs.core }}, fe=${{ needs.detect-changes.outputs.fe }})"
