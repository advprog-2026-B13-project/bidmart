name: CI

on:
  workflow_call:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      core: ${{ steps.filter.outputs.core }}
      fe: ${{ steps.filter.outputs.fe }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            core:
              - 'apps/bidmart-core/**'
              - '.github/workflows/ci.yml'
              - '.github/workflows/main.yml'
            fe:
              - 'apps/bidmart-fe/**'
              - '.github/workflows/ci.yml'
              - '.github/workflows/main.yml'

  # ========== BUILD & TEST ==========

  core:
    needs: detect-changes
    if: needs.detect-changes.outputs.core == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Compose
        uses: docker/setup-compose-action@v2
        with:
          version: latest

      - name: Run services
        working-directory: infra
        run: docker compose -f dev-compose.yml up -d

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        working-directory: apps/bidmart-core
        run: chmod +x gradlew

      - name: Build with Gradle
        working-directory: apps/bidmart-core
        run: ./gradlew build

      - name: Run tests + JaCoCo
        working-directory: apps/bidmart-core
        run: ./gradlew test jacocoTestReport

      - name: SonarCloud Scan
        working-directory: apps/bidmart-core
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./gradlew sonar --info

      - name: Cleanup
        if: always()
        working-directory: infra
        run: docker compose -f dev-compose.yml down

  fe:
    needs: detect-changes
    if: needs.detect-changes.outputs.fe == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: 'apps/bidmart-fe/pnpm-lock.yaml'

      - name: Install dependencies
        working-directory: apps/bidmart-fe
        run: pnpm install --no-frozen-lockfile

      - name: Lint
        working-directory: apps/bidmart-fe
        run: pnpm lint

      - name: Build
        working-directory: apps/bidmart-fe
        run: pnpm build

  # ========== SONARCLOUD SCANS ==========

  sonar-fe:
    needs: [detect-changes, fe]
    if: needs.detect-changes.outputs.fe == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: 'apps/bidmart-fe/pnpm-lock.yaml'

      - name: Install dependencies
        working-directory: apps/bidmart-fe
        run: pnpm install --no-frozen-lockfile

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: apps/bidmart-fe

  ci-summary:
    runs-on: ubuntu-latest
    needs: [detect-changes, core, fe, sonar-fe]
    if: always()
    steps:
      - name: Check CI results
        run: |
          CORE="${{ needs.core.result }}"
          FE="${{ needs.fe.result }}"
          SONAR_FE="${{ needs.sonar-fe.result }}"
          echo "core=$CORE  fe=$FE  sonar-fe=$SONAR_FE"
          if [[ "$CORE" == "failure" || "$CORE" == "cancelled" ]]; then
            echo "❌ core job $CORE"; exit 1
          fi
          if [[ "$FE" == "failure" || "$FE" == "cancelled" ]]; then
            echo "❌ fe job $FE"; exit 1
          fi
          if [[ "$SONAR_FE" == "failure" || "$SONAR_FE" == "cancelled" ]]; then
            echo "❌ sonar-fe job $SONAR_FE"; exit 1
          fi
          echo "✅ CI passed"
