name: Build and Push Core Docker Image

on:
  push:
    branches:
      - staging
      - feat/enhancements-and-integration
    paths:
      - 'apps/bidmart-core/**'
  workflow_dispatch:

jobs:
  core:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/advprog-2026-b13-project/bidmart-core
          tags: |
            type=ref,event=branch
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: apps/bidmart-core
          file: apps/bidmart-core/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: core
    runs-on: ubuntu-latest
    # if: github.ref == 'refs/heads/staging'
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            cd ~/bidmart
            docker compose -f infra/docker-compose.yml --env-file .env pull core
            docker compose -f infra/docker-compose.yml --env-file .env up -d core
            docker image prune -f