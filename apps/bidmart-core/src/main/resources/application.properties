spring.application.name=bidmart-core

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/bidmart_db}
spring.datasource.username=${DATABASE_USER:admin}
spring.datasource.password=${DATABASE_PASSWORD:password123}

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true
spring.flyway.out-of-order=false
spring.flyway.clean-disabled=true
spring.flyway.baseline-on-migrate=${FLYWAY_BASELINE_ON_MIGRATE:false}

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.database=${SPRING_DATA_REDIS_DATABASE:0}

jwt.secret=${AUTH_JWT_SECRET:ThisIsAVeryLongSecretKeyThatIs256BitsLongForHS256}
jwt.expiration-ms=${AUTH_JWT_EXPIRATION:900000}
jwt.refresh-valid-ms=${AUTH_JWT_REFRESH_VALID:3600000}

auth.session.max-active=${AUTH_SESSION_MAX_ACTIVE:3}
auth.session.limit-strategy=${AUTH_SESSION_LIMIT_STRATEGY:CONFIRMATION_TOKEN}
auth.session.replacement-token-ttl-seconds=${AUTH_SESSION_REPLACEMENT_TOKEN_TTL:300}

auth.registration.verification-otp-ttl-seconds=${AUTH_REGISTRATION_OTP_TTL:600}
auth.registration.verification-token-ttl-seconds=${AUTH_REGISTRATION_VERIFICATION_TOKEN_TTL:1800}
auth.frontend-base-url=${AUTH_FRONTEND_BASE_URL:http://localhost:3000}
auth.mfa.pre-auth-ttl-seconds=${AUTH_MFA_PREAUTH_TTL:300}

auth.email.from=${AUTH_EMAIL_FROM:no-reply@bidmart.store}
auth.email.otp-subject=${AUTH_EMAIL_OTP_SUBJECT:Your BidMart OTP code}
auth.email.password-reset-subject=${AUTH_EMAIL_PASSWORD_RESET_SUBJECT:Reset your BidMart password}
auth.email.app-name=${AUTH_EMAIL_APP_NAME:BidMart}
auth.email.resend.api-key=${RESEND_API_KEY:}

auth.cookie.access-token-name=${AUTH_COOKIE_ACCESS_NAME:bm_access_token}
auth.cookie.refresh-token-name=${AUTH_COOKIE_REFRESH_NAME:bm_refresh_token}
auth.cookie.path=${AUTH_COOKIE_PATH:/}
auth.cookie.domain=${AUTH_COOKIE_DOMAIN:}
auth.cookie.same-site=${AUTH_COOKIE_SAME_SITE:Lax}
auth.cookie.secure=${AUTH_COOKIE_SECURE:false}

auth.password-reset.token-ttl-seconds=${AUTH_PASSWORD_RESET_TOKEN_TTL:1800}

management.endpoints.web.exposure.include=prometheus,health,metrics
management.endpoint.prometheus.enabled=true
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=method

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}
app.cors.allowed-methods=${APP_CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
app.cors.allowed-headers=${APP_CORS_ALLOWED_HEADERS:*}
app.cors.exposed-headers=${APP_CORS_EXPOSED_HEADERS:Authorization}
app.cors.allow-credentials=${APP_CORS_ALLOW_CREDENTIALS:true}
app.cors.max-age=${APP_CORS_MAX_AGE:3600}

spring.mail.host=${SPRING_MAIL_HOST:localhost}
spring.mail.port=${SPRING_MAIL_PORT:1025}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS:false}
spring.mail.properties.mail.smtp.connectiontimeout=${SPRING_MAIL_SMTP_CONNECTION_TIMEOUT_MS:30000}
spring.mail.properties.mail.smtp.timeout=${SPRING_MAIL_SMTP_TIMEOUT_MS:30000}
spring.mail.properties.mail.smtp.writetimeout=${SPRING_MAIL_SMTP_WRITE_TIMEOUT_MS:5000}

midtrans.server-key=${MIDTRANS_SERVER_KEY:server-key}
midtrans.client-key=${MIDTRANS_CLIENT_KEY:client-key}

midtrans.is-production=false
