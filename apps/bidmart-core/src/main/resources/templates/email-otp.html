<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{APP_NAME}} OTP</title>
</head>
<body style="margin:0;padding:0;background-color:#f6f8fb;font-family:Arial,sans-serif;color:#1f2937;">
<table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="background-color:#f6f8fb;padding:24px;">
    <tr>
        <td align="center">
            <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="max-width:560px;background:#ffffff;border-radius:12px;padding:24px;">
                <tr>
                    <td style="font-size:22px;font-weight:700;padding-bottom:12px;">{{APP_NAME}} Verification Code</td>
                </tr>
                <tr>
                    <td style="font-size:14px;line-height:1.6;padding-bottom:16px;">
                        Use the OTP code below to continue your verification process.
                    </td>
                </tr>
                <tr>
                    <td align="center" style="padding:12px 0 20px 0;">
                        <div style="display:inline-block;background:#eef2ff;border:1px solid #c7d2fe;border-radius:10px;padding:12px 20px;font-size:28px;letter-spacing:6px;font-weight:700;color:#1e3a8a;">
                            {{OTP_CODE}}
                        </div>
                    </td>
                </tr>
                <tr>
                    <td style="font-size:14px;line-height:1.6;padding-bottom:18px;">
                        This code expires in <strong>{{OTP_TTL_SECONDS}}</strong> seconds.
                    </td>
                </tr>
                {{VERIFICATION_LINK_BLOCK}}
                <tr>
                    <td style="font-size:12px;line-height:1.6;color:#6b7280;">
                        If you did not request this, you can safely ignore this email.
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
