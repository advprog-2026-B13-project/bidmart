spring.config.activate.on-profile=dev

spring.jpa.hibernate.ddl-auto=validate

auth.mfa.email.from=${AUTH_MFA_EMAIL_FROM:no-reply-dev@bidmart.store}
auth.mfa.email.subject=${AUTH_MFA_EMAIL_SUBJECT:Your BidMart OTP code}
auth.mfa.email.app-name=${AUTH_MFA_EMAIL_APP_NAME:BidMart Dev}
auth.mfa.email.resend.api-key=${RESEND_API_KEY:}
auth.registration.verification-frontend-base-url=${AUTH_REGISTRATION_VERIFICATION_FRONTEND_BASE_URL:http://localhost:3000}
spring.mail.properties.mail.debug=${SPRING_MAIL_DEBUG:true}

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
app.cors.allow-credentials=${APP_CORS_ALLOW_CREDENTIALS:true}
auth.cookie.same-site=${AUTH_COOKIE_SAME_SITE:Lax}
auth.cookie.secure=${AUTH_COOKIE_SECURE:false}

midtrans.is-production=false
