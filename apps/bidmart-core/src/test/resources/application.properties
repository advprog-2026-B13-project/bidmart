spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.flyway.enabled=false

jwt.secret=ThisIsAVeryLongSecretKeyThatIs256BitsLongForHS256
jwt.expiration-ms=900000
jwt.refresh-valid-ms=3600000

spring.data.redis.host=localhost
spring.data.redis.port=6379

spring.mail.host=localhost
spring.mail.port=1025
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

midtrans.server-key=server-key
midtrans.client-key=client-key
midtrans.is-production=false

seeder.admin.email=admin@bidmart.store
seeder.admin.password=AdminPass123
