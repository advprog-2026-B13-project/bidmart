services:
  postgres:
    image: postgres:16-alpine
    container_name: bidmart-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: postgres 
      POSTGRES_MULTIPLE_DATABASES: auction_db,core_db
    volumes:
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8
    container_name: bidmart-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      retries: 3
      timeout: 5s

volumes:
  postgres_data:
  redis_data:
    driver: local
