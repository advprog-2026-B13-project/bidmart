services:
  postgres:
    image: postgres:16-alpine
    container_name: bidmart-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: postgres 
      POSTGRES_MULTIPLE_DATABASES: auction_db,core_db
    volumes:
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: