services:
  postgres:
    image: postgres:16
    container_name: bidmart-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: bidmart_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8
    container_name: bidmart-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      retries: 3
      timeout: 5s

volumes:
  postgres_data:
  redis_data:
    driver: local
