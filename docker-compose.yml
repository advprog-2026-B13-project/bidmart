services:
  postgres:
    image: postgres:16
    container_name: bidmart-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bidmart_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: postgres_secure_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "admin", "-d", "bidmart_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bidmart-network

  redis:
    image: redis:8
    container_name: bidmart-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bidmart-network

  core:
    image: ghcr.io/advprog-2026-b13-project/bidmart-core:staging
    container_name: bidmart-core
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:postgresql://postgres:5432/bidmart_db
      DATABASE_USER: admin
      DATABASE_PASSWORD: postgres_secure_pass
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:?AUTH_JWT_SECRET required}
      AUTH_REGISTRATION_VERIFICATION_FRONTEND_BASE_URL: ${FRONTEND_URL:?FRONTEND_URL required}
      APP_CORS_ALLOWED_ORIGINS: ${FRONTEND_URL:?FRONTEND_URL required}
      AUTH_COOKIE_SAME_SITE: None
      AUTH_COOKIE_SECURE: "true"
      AUTH_MFA_EMAIL_FROM: ${MAIL_FROM:-no-reply@bidmart.store}
      AUTH_MFA_EMAIL_SUBJECT: Your BidMart OTP code
      AUTH_MFA_EMAIL_APP_NAME: BidMart
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      APP_VERSION: ghcr.io/advprog-2026-b13-project/bidmart-core:staging
      MIDTRANS_SERVER_KEY: ${MIDTRANS_SERVER_KEY:-change-me}
      MIDTRANS_CLIENT_KEY: ${MIDTRANS_CLIENT_KEY:-change-me}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    networks:
      - bidmart-network

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: bidmart-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
    ports:
      - "9090:9090"
    depends_on:
      - core
    networks:
      - bidmart-network

  grafana:
    image: grafana/grafana:10.4.3
    container_name: bidmart-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "https://grafana.staging.bidmart.store"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - bidmart-network

  watchtower:
    image: containrrr/watchtower:1.7.1
    container_name: bidmart-watchtower
    restart: unless-stopped
    environment:
      DOCKER_API_VERSION: "1.41"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/kevincornelius1905/.docker/config.json:/config.json:ro
    command: --interval 30 --cleanup bidmart-core

  caddy:
    image: caddy:alpine
    container_name: bidmart-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - core
    networks:
      - bidmart-network

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
  prometheus_data:
  grafana_data:

networks:
  bidmart-network:
    driver: bridge
